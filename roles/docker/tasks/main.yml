---
# Installiert Docker Engine + Compose-Plugin (Compose v2) aus dem offiziellen
# Docker-Repository fuer Debian/Ubuntu.

- name: Keyring-Verzeichnis anlegen
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Docker-GPG-Schluessel hinterlegen
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: dpkg-Architektur ermitteln
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Docker-apt-Repository einbinden
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Docker Engine, CLI und Compose-Plugin installieren
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Docker-Dienst aktivieren und starten
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Login-User der Gruppe "docker" hinzufuegen
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
