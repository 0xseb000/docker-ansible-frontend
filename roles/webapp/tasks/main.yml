---
# Rollt die Nginx-Webanwendung als Docker-Compose-Projekt (Compose v2) aus.

- name: Projektverzeichnis anlegen
  ansible.builtin.file:
    path: "{{ webapp_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: HTML-Seite ausrollen
  # Wird live ins Container-Volume eingebunden -> kein Neustart noetig.
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ webapp_dir }}/index.html"
    mode: "0644"

- name: Nginx-Konfiguration ausrollen
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ webapp_dir }}/nginx.conf"
    mode: "0644"
  notify: Webapp-Container neu starten

- name: docker-compose.yml ausrollen
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ webapp_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Webapp-Container neu starten

- name: Webapp via Compose starten/aktualisieren
  community.docker.docker_compose_v2:
    project_src: "{{ webapp_dir }}"
    state: present
    pull: missing
