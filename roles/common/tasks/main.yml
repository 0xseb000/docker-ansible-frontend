---
# Allgemeine Vorbereitung der Zielsysteme (Debian/Ubuntu).

- name: apt-Cache aktualisieren
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Basis-Pakete installieren
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3
      - python3-apt
    state: present

- name: Systempakete aktualisieren (optional)
  ansible.builtin.apt:
    upgrade: dist
  when: common_apt_upgrade | default(false) | bool
