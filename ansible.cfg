# Ansible-Grundkonfiguration
[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
host_key_checking   = False          # Lab-Umgebung: Targets werden haeufig neu gebaut
interpreter_python  = auto_silent    # vermeidet Python-Interpreter-Warnungen (Debian/Ubuntu)
retry_files_enabled = False
stdout_callback     = yaml
forks               = 10

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False              # sudo via NOPASSWD; sonst Playbook mit --ask-become-pass starten
