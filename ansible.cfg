# Ansible-Grundkonfiguration
[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
# Lab-Umgebung: Targets werden haeufig neu gebaut
host_key_checking   = False
# Python-Interpreter automatisch ermitteln, Warnung unterdruecken
interpreter_python  = auto_silent
retry_files_enabled = False
stdout_callback     = yaml
forks               = 10

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
# sudo via NOPASSWD; sonst Playbook mit --ask-become-pass starten
become_ask_pass = False
